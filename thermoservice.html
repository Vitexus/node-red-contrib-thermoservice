<script type="text/javascript">
    RED.nodes.registerType('thermoservice-in', {
        category:    'input',
        color:       '#a6bbcf',
        defaults: {
            name:     { value: '' },
            url:      { value: 'http://localhost:5000/celsius', required: true },
            interval: { value: 60, required: true, validate: RED.validators.number() }
        },
        inputs:  0,
        outputs: 1,
        icon:    'thermoservice.svg',
        paletteLabel: 'thermoservice',
        label: function () {
            return this.name || 'thermoservice';
        },
        labelStyle: function () {
            return this.name ? 'node_label_italic' : '';
        },
        outputLabels: ['teplota']
    });
</script>

<script type="text/html" data-template-name="thermoservice-in">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Název</label>
        <input type="text" id="node-input-name" placeholder="thermoservice">
    </div>
    <div class="form-row">
        <label for="node-input-url"><i class="fa fa-globe"></i> URL</label>
        <input type="text" id="node-input-url" placeholder="http://localhost:5000/celsius" style="width:70%">
    </div>
    <div class="form-row">
        <label for="node-input-interval"><i class="fa fa-clock-o"></i> Interval (s)</label>
        <input type="number" id="node-input-interval" placeholder="60" min="5" style="width:80px">
    </div>
</script>

<script type="text/html" data-help-name="thermoservice-in">
    <p>Periodicky polluje DS18B20 teplotní senzor přes
       <a href="https://github.com/VitexSoftware/thermoservice">ThermoService</a>
       HTTP endpoint a vystavuje naměřenou teplotu jako zprávu.</p>

    <h3>Výstupy</h3>
    <ol class="node-ports">
        <li>teplota
            <dl class="message-properties">
                <dt>payload <span class="property-type">number</span></dt>
                <dd>Teplota ve °C (např. <code>21.375</code>)</dd>
                <dt>topic <span class="property-type">string</span></dt>
                <dd>Hostname senzoru</dd>
                <dt>sensor <span class="property-type">string</span></dt>
                <dd>Hostname senzoru</dd>
                <dt>rom <span class="property-type">string</span></dt>
                <dd>ROM ID DS18B20 čipu (např. <code>28-0123456789ab</code>)</dd>
                <dt>time <span class="property-type">string</span></dt>
                <dd>Čas měření (ISO 8601)</dd>
            </dl>
        </li>
    </ol>

    <h3>Nastavení</h3>
    <dl class="message-properties">
        <dt>URL</dt>
        <dd>Adresa ThermoService <code>/celsius</code> endpointu.</dd>
        <dt>Interval</dt>
        <dd>Frekvence dotazování v sekundách (minimum 5).</dd>
    </dl>

    <h3>Chybové stavy</h3>
    <p>Při chybě připojení nebo chybějícím senzoru node zobrazí červený status
       a vypíše chybu do debug panelu. Výstupní zpráva není odeslána.</p>
</script>
